logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: DEBUG

db:
  host: localhost
  port: 3306
  user: root
  password: 123456
  database: smart_data_analysis
  logger: true
  pool_size: 5
  max_overflow: 5
  pool_timeout: 60
  pool_recycle_timeout: 3600

dw:
  host: localhost
  port: 10000
  user: hiveserver2
  database: smart_data_analysis

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5


es:
  host: localhost
  port: 9200
  username: elastic
  password: changeme
  index_name: data_agent


llm:
  expand_keywords_llm:
    model_name: qwen-max
    # oc.env 是 OmegaConf 内置 resolver，无需注册，开箱即用, 使用 load_dotenv 把 .env 写入 os.environ
    api_key: &dashscope_key ${oc.env:DASHSCOPE_API_KEY}
    url: &dashscope_url https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.3
  filter_llm:
    model_name: deepseek-v3.2
    api_key: *dashscope_key
    url: *dashscope_url
  general_hql_llm:
    model_name: glm-5.1
    api_key: &openai_proxy_key ${oc.env:OPENAI_PROXY_API_KEY}
    url: &openai_proxy_url https://api.openai-proxy.org/v1
  validate_hql_llm:
    model_name: glm-5.1
    api_key: *openai_proxy_key
    url: *openai_proxy_url
  result_analyze_llm:
    model_name: deepseek-v3.2
    api_key: *dashscope_key
    url: *dashscope_url
